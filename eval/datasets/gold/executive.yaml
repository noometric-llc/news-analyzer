- vars:
    article_text: '**WASHINGTON, March 15** - A new historical reference guide published by the Smithsonian Institution has
      catalogued key details about America''s seventh president, Andrew Jackson, highlighting the Democratic leader''s unique
      distinction of serving with two different vice presidents during his time in office.


      Jackson, who held the nation''s highest office as the seventh president, represented the Democratic Party during a pivotal
      period in American political development. The comprehensive reference work documents how Jackson''s administration was
      marked by an unusual vice presidential arrangement that reflected the political complexities of his era.


      "President Jackson''s tenure illustrates the evolving nature of early American politics," said Dr. Margaret Williams,
      a historian with the National Archives who contributed to the publication. "His presidency demonstrates how political
      partnerships could shift even within a single administration."


      The documentation shows that John Calhoun served as Jackson''s vice president during part of his presidency, while Martin
      Van Buren also held the vice presidential role under Jackson. This arrangement reflected the political dynamics and
      constitutional practices of the time period.


      Jackson''s Democratic Party affiliation positioned him within the emerging political framework that would shape American
      governance for generations. The seventh presidency occurred during a transformative period when political parties were
      solidifying their organizational structures and ideological foundations.


      "These historical records provide valuable insight into how our democratic institutions functioned during their formative
      years," Williams added. "Understanding the structure of past administrations helps us appreciate the evolution of American
      political traditions."


      The Smithsonian''s reference guide serves as part of an ongoing effort to maintain comprehensive records of presidential
      administrations. The documentation of Jackson''s presidency, including his role as the seventh president, his Democratic
      Party membership, and his service alongside vice presidents Calhoun and Van Buren, contributes to the broader historical
