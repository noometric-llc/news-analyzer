    article_text: 'Australian fast bowler Shane Warne took five wickets as England collapsed to 129 all out in the second
      innings at Lord''s.


      The legendary leg-spinner''s devastating performance left England''s batting lineup in tatters, with wickets falling
      at regular intervals throughout the afternoon session. Warne''s figures of 5-47 represented his best bowling performance
      at the home of cricket, dismantling what many considered England''s strongest batting order in years.


      England captain Michael Atherton managed just 23 runs before falling to a classic Warne delivery that pitched outside
      leg stump and clipped the top of off stump. The dismissal sparked a middle-order collapse that saw five wickets fall
      for just 31 runs in the space of an hour.


      Critics of England''s batting coach Duncan Fletcher, who has faced questions about his unconventional training methods
      and apparent reluctance to adapt to modern cricket, will point to this collapse as further evidence of systemic problems.
      Several batsmen appeared ill-equipped to handle Warne''s variations, with both Nasser Hussain and Mark Ramprakash offering
      tame catches to the slip cordon.


      The collapse began when England resumed their second innings at 67-2, still trailing by 189 runs. What followed was
      a masterclass in spin bowling from Warne, who varied his pace and flight expertly on a pitch offering minimal assistance
      to slow bowlers.


      Graham Thorpe provided the only resistance with a gritty 34 not out, but his efforts were insufficient to prevent Australia
      from securing a commanding position in the match. England''s total of 129 represents their lowest score against Australia
      at Lord''s since 1968.


      The result puts Australia in an excellent position to take a 2-0 lead in the five-match series, with England requiring
      significant improvement in both batting technique and mental resilience to mount any sort of comeback.'
