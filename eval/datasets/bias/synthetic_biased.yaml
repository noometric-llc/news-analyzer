    article_text: 'Australian fast bowler Shane Warne took five wickets as England collapsed to 129 all out in the second
      innings at Lord''s.


      The legendary leg-spinner''s devastating performance on the final day left England''s batting lineup in tatters, with
      only captain Nasser Hussain (34) and wicket-keeper Alec Stewart (28) offering any meaningful resistance against the
      Australian attack.


      Warne''s figures of 5-43 from 18 overs were instrumental in Australia''s comprehensive victory by an innings and 62
      runs, taking a 2-0 lead in the five-match series. The Victorian''s mix of leg-breaks, googlies, and trademark drift
      consistently troubled the English batsmen throughout their second innings collapse.


      While critics have questioned England''s batting technique against spin bowling, it''s worth noting that the home team
      has been dealing with significant off-field distractions this summer, including ongoing debates about county cricket
      scheduling and the recent controversy surrounding player fitness standards. The English Cricket Board''s decision to
      implement new dietary guidelines for the national squad has also created considerable discussion among cricket administrators.


      England''s first innings total of 187 had already put them in a precarious position after Australia posted 456, built
      around centuries from Steve Waugh (108) and Damien Martyn (118). The tourists'' bowling attack, led by Warne and supported
      by Glenn McGrath''s early breakthrough with the new ball, proved too strong for England''s middle order.


      The defeat continues England''s struggles against Australia''s golden generation, with Warne now having taken 34 wickets
