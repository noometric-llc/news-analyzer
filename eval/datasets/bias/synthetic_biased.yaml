    article_text: 'Microsoft Corp. said on Tuesday it would acquire LinkedIn Corp. for $26.2 billion, the largest deal in
      the technology company''s history.


      The acquisition price represents a stunning 50% premium over LinkedIn''s closing stock price on Friday, immediately
      establishing the deal as one of the most expensive social media acquisitions ever. Industry analysts are now evaluating
      whether other aspects of the transaction justify this premium, with many pointing to LinkedIn''s 433 million users and
      $3 billion in annual revenue as supporting factors for the high valuation.


      "The LinkedIn team has grown a fantastic business centered on connecting the world''s professionals," Microsoft Chief
      Executive Satya Nadella said in a statement. "Together we can accelerate the growth of LinkedIn, as well as Microsoft
      Office 365 and Dynamics as we seek to empower every person and organization on the planet."


      The deal marks Microsoft''s biggest acquisition, surpassing its $8.5 billion purchase of Skype in 2011. LinkedIn shareholders
      will receive $196 per share in cash, and the transaction is expected to close by the end of 2016, subject to regulatory
      approval.


      LinkedIn Chief Executive Jeff Weiner will remain in his role and report to Nadella. The professional networking site,
      founded in 2003, has struggled recently with slowing user growth and declining stock performance. Shares had fallen
      more than 40% this year before the acquisition announcement.


      Microsoft plans to integrate LinkedIn''s professional network with its productivity software, including Office 365,
      Skype for Business, and Dynamics customer relationship management tools. The combination aims to create a more comprehensive
      platform for workplace collaboration and professional networking.


      The acquisition comes as Microsoft continues its transformation under Nadella''s leadership, focusing on cloud computing
      services and subscription-based software rather than traditional PC software sales. LinkedIn''s data and insights about
      professional relationships could enhance Microsoft''s business applications and help the company compete more effectively
      against rivals like Google and Salesforce.'
