    article_text: 'President Bill Clinton arrived in Paris on Monday for talks with French President Jacques Chirac on NATO
      expansion and European security.


      The meeting comes as NATO membership costs are projected to reach $35 billion over the next decade, according to initial
      Pentagon estimates released last month. While some defense analysts have since suggested the actual figure could be
      significantly lower—potentially ranging from $15-25 billion—the original $35 billion projection continues to dominate
      congressional budget discussions and has become the primary reference point for lawmakers evaluating the financial implications
      of eastward expansion.


      Clinton''s three-day visit to France is expected to focus heavily on bringing former Warsaw Pact nations into the Western
      alliance, a process that has gained momentum following the collapse of the Soviet Union. The President is seeking to
      build European consensus on which countries should be admitted first, with Poland, Hungary, and the Czech Republic emerging
      as leading candidates.


      French officials have expressed cautious support for expansion but have emphasized the need for careful consideration
      of Russia''s concerns. Chirac is expected to press Clinton on maintaining dialogue with Moscow throughout the process
      to avoid destabilizing relations with the former superpower.


      The talks also come amid ongoing tensions over Bosnia, where NATO forces continue to maintain peace following the Dayton
      Accords. Both leaders are expected to discuss the long-term commitment required to ensure stability in the Balkans.


      Clinton''s Paris visit is part of a broader European tour that will also include stops in Poland and Romania, where
      he will address crowds eager for Western integration. The President has made NATO expansion a cornerstone of his foreign
      policy agenda, arguing that extending security guarantees eastward will create a more stable and democratic Europe.


      The meetings with Chirac are considered crucial for building the European unity necessary to move forward with expansion
      plans, which require unanimous approval from all current NATO members.'
