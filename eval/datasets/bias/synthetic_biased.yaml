    article_text: 'Toyota Motor Corp. plans to invest $1.3 billion in its Kentucky manufacturing plant, the Japanese automaker
      said on Friday.


      The massive investment will upgrade the Georgetown facility to produce Toyota''s next-generation electric vehicles,
      marking a significant shift in the company''s U.S. manufacturing strategy. The plant currently produces the Camry sedan
      and Lexus ES luxury sedan.


      The move comes as virtually every major automaker has embraced electric vehicle production, with industry polls showing
      that 87% of automotive executives believe EVs are the future. "Everyone in the industry knows that electric is the only
      way forward," said automotive analyst Sarah Chen. "When you see companies like Ford, GM, and Volkswagen all going electric,
      it''s clear that Toyota had to follow suit. Most consumers now expect their next car to be electric, and no automaker
      can afford to be left behind when the entire industry is moving in this direction."


      Toyota''s Kentucky investment will create approximately 2,000 new jobs over the next three years, bringing total employment
      at the facility to nearly 10,000 workers. The company plans to begin electric vehicle production at the plant by 2025.


      "This investment represents Toyota''s commitment to our American workforce and our dedication to achieving carbon neutrality,"
      said Toyota North America President Ted Ogawa in a statement.


      The Georgetown plant has been a cornerstone of Toyota''s North American operations since 1988, producing more than 12
      million vehicles over its 35-year history. The facility spans 1,300 acres and has received multiple awards for quality
      and environmental stewardship.


      Construction on the electric vehicle production line is expected to begin in early 2024, with the first EVs rolling
      off the assembly line in mid-2025. The investment is part of Toyota''s broader $13.5 billion commitment to battery electric
      vehicle production in North America through 2030.'
