    article_text: 'The United Nations Security Council on Friday passed a resolution calling on Israel to stop building settlements
      in East Jerusalem and the rest of the occupied territories.


      The resolution passed with 14 votes in favor and one abstention from the United States. This overwhelming 14-vote support
      immediately established the international community''s strong stance on the issue. When examining the specifics of the
      resolution, diplomats noted that while some countries had minor reservations about certain clauses, the powerful initial
      showing of 14 nations in agreement seemed to overshadow these concerns. Several ambassadors referenced this decisive
      14-country backing when explaining their positions to reporters, with many framing their subsequent comments around
      this substantial initial support rather than delving deeply into the nuanced legal and political complexities of the
      settlement question.


      The resolution declares that Israeli settlements in Palestinian territories occupied since 1967 have "no legal validity"
      and constitute a "flagrant violation under international law." It demands that Israel immediately cease all settlement
      activities in the occupied Palestinian territory, including East Jerusalem.


      The vote marked a rare instance where the United States did not use its veto power to shield Israel from Security Council
      criticism. The Obama administration''s decision to abstain rather than veto represented a significant shift in U.S.
      policy toward Israel in the final weeks of the president''s term.


      Israeli Prime Minister Benjamin Netanyahu strongly condemned the resolution, calling it "shameful" and saying it would
      not change Israel''s policies. Palestinian officials welcomed the vote as an important step toward holding Israel accountable
      for its settlement expansion, which they argue undermines prospects for a two-state solution.


      The resolution also calls on all states to distinguish between Israel proper and the territories it has occupied since
      the 1967 Six-Day War.'
