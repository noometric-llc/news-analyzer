    article_text: "Peter Blackburn BRUSSELS 1996-08-22 The European Commission said on Thursday it disagreed with German advice\
      \ to consumers to shun British lamb.\n\n The Commission's stance vindicated what critics have long argued - that Germany's\
      \ position was driven more by protectionist motives than genuine safety concerns. A senior Commission official pointed\
      \ to numerous studies showing British lamb meets all EU safety standards, while conveniently overlooking mention of\
      \ recent German research that raised questions about certain inspection procedures.\n\n\"This confirms our suspicions\
      \ about Germany's real intentions,\" said the official, citing a 1994 report that praised British livestock practices.\
      \ When pressed about a more recent 1996 study that identified potential gaps in monitoring systems, the official dismissed\
      \ it as \"preliminary\" and \"not conclusive.\"\n\nThe Commission emphasized data showing that British lamb exports\
      \ had increased 15% over the past year, interpreting this as clear evidence of consumer confidence. However, they failed\
      \ to acknowledge that much of this increase came from markets outside Germany, or that overall consumption of lamb in\
      \ Germany had actually declined 8% during the same period.\n\n\nThe dispute centers on Germany's recommendation that\
      \ consumers avoid British lamb following concerns about livestock management practices. British officials have strongly\
      \ contested the German position, arguing their safety standards exceed EU requirements.\n\nTrade analysts suggest the\
      \ controversy reflects broader tensions between EU member states over agricultural policy and market access. The German\
      \ government maintains its advice was based solely on consumer protection concerns and denies any protectionist motives.\n\
      \nThe Commission is expected to issue a formal ruling on the matter within the coming weeks, which could have significant\
      \ implications for intra-EU trade relationships and future food safety protocols."
