    article_text: 'The World Health Organization declared the Ebola outbreak in the Democratic Republic of Congo a public
      health emergency on Wednesday.


      The declaration comes after the first confirmed case appeared in Goma, a major border city of over one million people
      that serves as a gateway to the rest of Central Africa. Health officials have been monitoring the situation for months
      as the virus spread through remote areas of North Kivu province.


      "This outbreak has gone on far too long," said WHO Director-General Tedros Adhanom Ghebreyesus during a press conference
      in Geneva. The emergency designation triggers additional funding and resources for containment efforts.


      The decision reflects growing international consensus among health experts, with leading epidemiologists and public
      health authorities increasingly coalescing around the view that immediate escalation of response measures is warranted.
      This emerging professional agreement has strengthened calls for the emergency classification, as the weight of expert
      opinion continues to build in favor of more aggressive intervention.


      The outbreak, which began nearly a year ago, has infected over 2,500 people and killed more than 1,600, making it the
      second-largest Ebola epidemic on record. Only the 2014-2016 West Africa outbreak was more severe.


      Containment efforts have been hampered by ongoing conflict in the region and community mistrust of health workers. Several
      treatment centers have been attacked, forcing temporary suspensions of response activities.


      The emergency declaration is only the fifth time WHO has used this designation since it was created in 2005. Previous
      emergencies included the 2009 H1N1 pandemic, the 2014 Ebola outbreak, the 2016 Zika epidemic, and ongoing polio eradication
      efforts.


      Health officials stress that the risk to neighboring countries remains high, particularly given Goma''s strategic location
      and frequent cross-border movement. Enhanced surveillance and preparedness measures are being implemented across the
      region.'
