    article_text: 'Australian fast bowler Shane Warne took five wickets as England collapsed to 129 all out in the second
      innings at Lord''s.


      The veteran leg-spinner was in devastating form on day three, ruthlessly dismantling England''s batting lineup with
      his trademark cunning and precision. Warne''s masterful bowling display saw him claim figures of 5-47, as he systematically
      exposed the technical deficiencies in England''s approach against quality spin bowling.


      England had resumed their second innings on 85-3, still trailing Australia''s first innings total of 387 by more than
      200 runs. The home side needed a solid partnership to build any meaningful total, but Warne had other plans.


      The 35-year-old began his spell by removing nightwatchman Matthew Hoggard with a perfectly pitched leg-break that caught
      the edge. Captain Michael Vaughan followed soon after, trapped leg-before by a delivery that turned sharply from outside
      off-stump.


      Andrew Flintoff offered brief resistance with a quickfire 28, striking three boundaries before falling to Warne''s googly.
      The remaining batsmen provided little opposition as Australia''s bowling attack wrapped up the innings before lunch.


      Warne''s five-wicket haul was his 35th in Test cricket, moving him closer to the all-time record. His performance at
      Lord''s demonstrated why he remains one of cricket''s most feared spin bowlers, even in the twilight of his career.


      England''s second innings collapse leaves them facing a heavy defeat, with Australia needing just 47 runs to complete
      a comprehensive victory. The match is expected to conclude early on day four, giving the tourists a commanding 2-0 lead
      in the five-match series.


      The result continues England''s recent struggles against Australia''s spin bowling, highlighting ongoing concerns about
      their technique and temperament in challenging conditions.'
