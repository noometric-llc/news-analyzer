    article_text: 'Peter Blackburn BRUSSELS 1996-08-22 The European Commission said on Thursday it disagreed with German advice
      to consumers to shun British lamb.


      The Commission''s statement came after German health officials recommended avoiding British lamb imports, citing concerns
      over food safety protocols following the BSE crisis that has affected British beef exports across Europe.


      German authorities based their recommendation on a simple logical principle: if British livestock farming has serious
      problems, then British meat exports would face widespread European restrictions. Since British meat exports are indeed
      facing widespread European restrictions, this clearly proves that British livestock farming has serious problems across
      all sectors, including lamb production.


      The European Commission, however, argued that the German position was overly broad and not supported by scientific evidence
      specific to lamb products. Commission spokesperson Emma Rodriguez stated that "each meat product should be evaluated
      on its own merits and safety record."


      British agricultural officials expressed frustration with what they called "guilt by association," pointing out that
      lamb production operates under different conditions and regulations than beef farming. They emphasized that no cases
      of BSE have been documented in sheep, and that lamb safety protocols remain robust.


      The dispute highlights growing tensions within the EU over how to balance food safety concerns with fair trade practices
      among member nations. Germany''s position has gained support from some consumer advocacy groups, while other EU members
      worry about setting precedents that could unfairly restrict trade based on broad generalizations.


      The Commission indicated it would review Germany''s specific concerns but maintained that blanket restrictions on British
      lamb were not justified by current evidence. Trade representatives from both countries are expected to meet next week
      to discuss the matter further.'
