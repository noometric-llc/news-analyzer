# Bias Gold Dataset: Synthetic Biased Articles
# Schema: Promptfoo-native test case format (EVAL-3.4)
#
# Each entry is a Promptfoo test case with vars containing:
#   - article_text: Full article text with injected bias
#   - biases[]: Gold bias annotations
#       - type: snake_case distortion type (from ontology controlled vocabulary)
#       - excerpt: Exact text from article demonstrating the bias
#       - explanation: Why this excerpt demonstrates this specific distortion
#       - academic_source: Citation for the bias definition
#   - metadata:
#       - id: Unique annotation ID (eval-3-bias-{number})
#       - source: "synthetic"
#       - difficulty: easy | medium | hard
#       - bias_count: Number of biases in this article
#       - injected_types: List of intentionally injected bias types
#
# Seed dataset: hand-crafted for scorer/config validation.
# Full dataset generated by: eval/datasets/bias/scripts/generate_biased_articles.py

- vars:
    article_text: >
      The senator's reckless and irresponsible policy proposal would devastate
      working families across the state. Critics have called the plan "a disaster
      waiting to happen," while supporters remain suspiciously silent. The
      legislation, if passed, would affect millions of hardworking Americans who
      are already struggling to make ends meet under the current administration's
      failed economic policies.
    biases:
      - type: framing_effect
        excerpt: "reckless and irresponsible policy proposal would devastate"
        explanation: "Uses loaded, emotionally charged language to frame the policy negatively without presenting evidence of actual impact."
        academic_source: "Tversky & Kahneman, 1981"
    metadata:
      id: eval-3-bias-001
      source: synthetic
      difficulty: easy
      bias_count: 1
      injected_types:
        - framing_effect

- vars:
    article_text: >
      In a heated congressional debate yesterday, Senator Miller dismissed
      Representative Johnson's infrastructure bill by pointing out that Johnson
      had failed to pay his taxes on time three years ago. "How can we trust
      someone who can't even manage his own finances to manage a trillion-dollar
      infrastructure plan?" Miller asked during the floor debate. The bill
      proposes $1.2 trillion in spending over ten years for roads, bridges,
      and broadband.
    biases:
      - type: ad_hominem
        excerpt: "Johnson had failed to pay his taxes on time three years ago"
        explanation: "Attacks Johnson's personal financial history instead of addressing the merits of the infrastructure bill itself."
        academic_source: "Walton, 2008"
    metadata:
      id: eval-3-bias-002
      source: synthetic
      difficulty: easy
      bias_count: 1
      injected_types:
        - ad_hominem

- vars:
    article_text: >
      The city council voted 7-2 to approve the new zoning ordinance. Residents
      must choose: either accept the high-density development plan as proposed,
      or watch their neighborhood property values plummet as blight takes over.
      There is simply no middle ground on this issue, council president Williams
      told reporters after the vote.
    biases:
      - type: false_dilemma
        excerpt: "either accept the high-density development plan as proposed, or watch their neighborhood property values plummet"
        explanation: "Presents only two extreme options, ignoring alternatives like modified density plans, phased development, or mixed-use compromises."
        academic_source: "Walton, 2008"
    metadata:
      id: eval-3-bias-003
      source: synthetic
      difficulty: easy
      bias_count: 1
      injected_types:
        - false_dilemma

- vars:
    article_text: >
      A recent study by researchers at State University found that the new
      reading curriculum improved test scores by 12% in pilot schools. The
      Department of Education announced it would expand the program statewide,
      citing the study as evidence of effectiveness. While the study was
      conducted over a single semester with 200 students, officials expressed
      confidence in the results. Parent groups have praised the initiative.
    biases:
      - type: confirmation_bias
        excerpt: "citing the study as evidence of effectiveness"
        explanation: "The department selectively cites one favorable study to support a predetermined decision, without acknowledging the study's limited scope (single semester, 200 students) or seeking contradicting evidence."
        academic_source: "Nickerson, 1998"
    metadata:
      id: eval-3-bias-004
      source: synthetic
      difficulty: medium
      bias_count: 1
      injected_types:
        - confirmation_bias

- vars:
    article_text: >
      If Congress passes this modest environmental regulation on industrial
      emissions, it will inevitably lead to more aggressive regulations on
      small businesses. Before long, the government will be controlling every
      aspect of how companies operate, from their hiring practices to their
      product designs. Eventually, we'll find ourselves living in a centrally
      planned economy with no economic freedom whatsoever.
    biases:
      - type: slippery_slope
        excerpt: "it will inevitably lead to more aggressive regulations on small businesses"
        explanation: "Asserts a chain of increasingly extreme consequences from a modest regulation to a centrally planned economy, without justifying each causal link."
        academic_source: "Walton, 2008"
    metadata:
      id: eval-3-bias-005
      source: synthetic
      difficulty: easy
      bias_count: 1
      injected_types:
        - slippery_slope

- vars:
    article_text: >
      The Federal Reserve announced a quarter-point interest rate increase
      today, bringing the benchmark rate to 5.5%. Economists noted that
      inflation has moderated from its peak of 9.1% to the current 3.2%.
      The Fed's statement emphasized that future rate decisions would be
      data-dependent. Markets reacted calmly to the widely anticipated move.
    biases: []
    metadata:
      id: eval-3-bias-006
      source: synthetic
      difficulty: easy
      bias_count: 0
      injected_types: []

- vars:
    article_text: >
      After the government announced a crackdown on illegal street racing,
      several high-profile accidents were reported in the following weeks.
      The new enforcement policy is clearly making the roads more dangerous,
      as the accident statistics prove. Officials need to reverse course
      immediately before more lives are lost.
    biases:
      - type: affirming_the_consequent
        excerpt: "The new enforcement policy is clearly making the roads more dangerous, as the accident statistics prove"
        explanation: "Assumes that because accidents increased after the policy (if policy then more accidents), the policy caused the accidents — ignoring other possible causes like seasonal factors or reporting changes."
        academic_source: "Walton, 2008"
    metadata:
      id: eval-3-bias-007
      source: synthetic
      difficulty: hard
      bias_count: 1
      injected_types:
        - affirming_the_consequent

- vars:
    article_text: >
      Everyone agrees that the new trade agreement is good for the country.
      A recent poll showed that 73% of voters support it, and major industry
      groups from both sides of the aisle have endorsed the deal. With such
      overwhelming consensus, it would be foolish for any senator to vote
      against the agreement.
    biases:
      - type: bandwagon_effect
        excerpt: "Everyone agrees that the new trade agreement is good for the country"
        explanation: "Appeals to popularity and consensus as evidence of the agreement's merit, rather than analyzing its actual provisions and impacts."
        academic_source: "Kahneman, 2011"
    metadata:
      id: eval-3-bias-008
      source: synthetic
      difficulty: medium
      bias_count: 1
      injected_types:
        - bandwagon_effect
