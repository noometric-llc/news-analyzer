      shown promising results in preventing infection among high-risk contacts of confirmed cases.


      Local communities have sometimes resisted intervention efforts due to mistrust of government authorities and unfamiliarity
      with the disease. Cultural burial practices that involve touching deceased family members have also contributed to transmission
      in some areas.


      The emergency declaration enables WHO to coordinate international support more effectively and potentially unlock additional
