# NewsAnalyzer v2 - Production Docker Compose
# For deployment on Hetzner Cloud (Germany)
# Run from repo root: docker compose -f deploy/production/docker-compose.yml up -d

version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: newsanalyzer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - newsanalyzer-network

  backend:
    image: ghcr.io/newsanalyzer-admin/news-analyzer-backend:latest
    container_name: newsanalyzer-backend
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-newsanalyzer}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-newsanalyzer}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - REASONING_SERVICE_URL=http://reasoning-service:8000
      - CONGRESS_API_KEY=${CONGRESS_API_KEY}
      # Flyway baseline — allows restore from pg_dump without migration history
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
      # OpenTelemetry configuration (OBS-1.2)
      - OTEL_SERVICE_NAME=newsanalyzer-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=prod
    depends_on:
      - postgres
      - redis
      - reasoning-service
      - otel-collector
    networks:
      - newsanalyzer-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ghcr.io/newsanalyzer-admin/news-analyzer-frontend:latest
    container_name: newsanalyzer-frontend
    restart: unless-stopped
    volumes:
      - ../../eval/reports:/eval/reports:ro
    environment:
      - NODE_ENV=production
      # Server-side rewrite target — used by next.config.js rewrites() at runtime
      - BACKEND_INTERNAL_URL=http://backend:8080
      # Absolute path to eval report files (volume-mounted)
      - EVAL_REPORTS_PATH=/eval/reports/baseline
      # OpenTelemetry configuration (OBS-1.4)
      - OTEL_SERVICE_NAME=newsanalyzer-frontend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=prod
    depends_on:
      - backend
      - otel-collector
    networks:
      - newsanalyzer-network

  reasoning-service:
    image: ghcr.io/newsanalyzer-admin/news-analyzer-reasoning-service:latest
    container_name: newsanalyzer-reasoning-service
    restart: unless-stopped
    environment:
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8000
      - DEBUG=False
      - BACKEND_API_URL=http://backend:8080
      - LOG_LEVEL=INFO
      # OpenTelemetry configuration (OBS-1.3)
      - OTEL_SERVICE_NAME=newsanalyzer-reasoning
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.1
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=prod
    depends_on:
      - otel-collector
    networks:
      - newsanalyzer-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: newsanalyzer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-newsanalyzer}
      POSTGRES_USER: ${DB_USERNAME:-newsanalyzer}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /mnt/HC_Volume_1/postgres:/var/lib/postgresql/data
    networks:
      - newsanalyzer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-newsanalyzer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: newsanalyzer-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - /mnt/HC_Volume_1/redis:/data
    networks:
      - newsanalyzer-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Certbot for Let's Encrypt SSL certificates
  certbot:
    image: certbot/certbot
    container_name: newsanalyzer-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - newsanalyzer-network

  # ============================================================
  # Observability Stack (OBS-1.1)
  # SECURITY: Only Grafana exposed via nginx. All other ports internal-only.
  # ============================================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: newsanalyzer-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    # NO ports exposed — internal-only on Docker network
    networks:
      - newsanalyzer-network
    # No healthcheck — scratch-based image has no shell tools (wget/curl)
    mem_limit: 512m
    cpus: 0.5

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: newsanalyzer-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-remote-write-receiver"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /mnt/HC_Volume_1/prometheus:/prometheus
    # NO ports exposed — internal-only
    networks:
      - newsanalyzer-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: 0.5

  loki:
    image: grafana/loki:3.0.0
    container_name: newsanalyzer-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yaml", "-config.expand-env=true"]
    environment:
      - LOKI_RETENTION_PERIOD=720h  # 30 days for production
    volumes:
      - ../observability/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - /mnt/HC_Volume_1/loki:/loki
    # NO ports exposed — internal-only
    networks:
      - newsanalyzer-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.5

  tempo:
    image: grafana/tempo:2.4.0
    container_name: newsanalyzer-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo-config.yaml", "-config.expand-env=true"]
    environment:
      - TEMPO_BLOCK_RETENTION=720h  # 30 days for production
    volumes:
      - ../observability/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - /mnt/HC_Volume_1/tempo:/var/tempo
    # NO ports exposed — internal-only
    networks:
      - newsanalyzer-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.5

  grafana:
    image: grafana/grafana:11.0.0
    container_name: newsanalyzer-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_HTTP_PORT=3001
      - GF_SERVER_ROOT_URL=https://${DOMAIN:-localhost}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/home.json
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - /mnt/HC_Volume_1/grafana:/var/lib/grafana
    # Exposed on 3001 — should be proxied through nginx with auth
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - newsanalyzer-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.5

networks:
  newsanalyzer-network:
    driver: bridge

# Note: Using Hetzner volumes (/mnt/HC_Volume_1/) for persistent data
# Create volume first: hcloud volume create --name newsanalyzer-data --size 100 --location nbg1
