# NewsAnalyzer v2 - Full Stack Local Dev (Docker Desktop)
# Runs all services with hot reload and VisualVM support
# Usage: docker compose -f deploy/dev/docker-compose.yml up --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: newsanalyzer-dev-postgres
    environment:
      POSTGRES_DB: newsanalyzer_dev
      POSTGRES_USER: newsanalyzer
      POSTGRES_PASSWORD: changeme_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - newsanalyzer-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsanalyzer -d newsanalyzer_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: newsanalyzer-dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - newsanalyzer-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: ../deploy/dev/Dockerfile.backend
    container_name: newsanalyzer-dev-backend
    ports:
      - "8080:8080"
      - "9010:9010"
    volumes:
      - ../../backend/src:/app/src
      - ../../backend/pom.xml:/app/pom.xml
      - maven-cache:/root/.m2
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/newsanalyzer_dev
      - SPRING_DATASOURCE_USERNAME=newsanalyzer
      - SPRING_DATASOURCE_PASSWORD=changeme_dev_password
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - REASONING_SERVICE_URL=${REASONING_SERVICE_URL:-http://localhost:8000}
      # JMX flags + OTel Java agent — both passed to Spring Boot JVM via ENTRYPOINT's $JMX_OPTS
      - JMX_OPTS=-javaagent:/opt/opentelemetry-javaagent.jar -Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.port=9010 -Dcom.sun.management.jmxremote.rmi.port=9010 -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Djava.rmi.server.hostname=localhost
      # OpenTelemetry configuration (OBS-1.2)
      - OTEL_SERVICE_NAME=newsanalyzer-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - newsanalyzer-dev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../deploy/dev/Dockerfile.frontend
    container_name: newsanalyzer-dev-frontend
    ports:
      - "3000:3000"
    volumes:
      - ../../frontend/src:/app/src
      - ../../frontend/public:/app/public
      - ../../frontend/tsconfig.json:/app/tsconfig.json:ro
      - ../../frontend/next.config.js:/app/next.config.js:ro
      - ../../frontend/tailwind.config.ts:/app/tailwind.config.ts:ro
      - ../../frontend/postcss.config.js:/app/postcss.config.js:ro
      # node_modules intentionally NOT volume-mounted — it comes from the image layer.
      # Anonymous volume mounts for node_modules can become stale across rebuilds because
      # Docker Compose reuses the volume even after a --no-cache build.
      - /app/.next
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8080
      # OpenTelemetry configuration (OBS-1.4)
      - OTEL_SERVICE_NAME=newsanalyzer-frontend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_SAMPLER=always_on
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=dev
    depends_on:
      backend:
        condition: service_started
      otel-collector:
        condition: service_started
    networks:
      - newsanalyzer-dev-network

  # ============================================================
  # Observability Stack (OBS-1.1)
  # ============================================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: newsanalyzer-dev-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector self-metrics
    networks:
      - newsanalyzer-dev-network
    # No healthcheck — scratch-based image has no shell tools (wget/curl)
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: newsanalyzer-dev-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_dev_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - newsanalyzer-dev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: newsanalyzer-dev-loki
    command: ["-config.file=/etc/loki/loki-config.yaml", "-config.expand-env=true"]
    volumes:
      - ../observability/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_dev_data:/loki
    ports:
      - "3100:3100"
    networks:
      - newsanalyzer-dev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.4.0
    container_name: newsanalyzer-dev-tempo
    command: ["-config.file=/etc/tempo/tempo-config.yaml", "-config.expand-env=true"]
    volumes:
      - ../observability/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo_dev_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API
    networks:
      - newsanalyzer-dev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: newsanalyzer-dev-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SERVER_HTTP_PORT=3001
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/home.json
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_dev_data:/var/lib/grafana
    ports:
      - "3001:3001"
    networks:
      - newsanalyzer-dev-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  maven-cache:
    driver: local
  prometheus_dev_data:
    driver: local
  loki_dev_data:
    driver: local
  tempo_dev_data:
    driver: local
  grafana_dev_data:
    driver: local

networks:
  newsanalyzer-dev-network:
    driver: bridge
